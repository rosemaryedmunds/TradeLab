<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>TradeLab True SPX Chart Redirect</title>
<style>
:root{color-scheme:dark;font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#07080a;color:#f4f1ea}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#07080a}.card{max-width:620px;border:1px solid #2a303b;border-radius:24px;background:#101216;padding:28px;box-shadow:0 18px 60px rgba(0,0,0,.34)}
h1{margin:0 0 10px;font-size:28px;letter-spacing:-.03em}.muted{color:#9d9a91;line-height:1.5}a{color:#ffd166;font-weight:800}
</style>
</head>
<body>
<div class="card">
  <h1>Opening the dynamic true SPX chart...</h1>
  <p class="muted">This May 8 link now forwards to the reusable TradeLab chart route with true SPX cash-index candles.</p>
  <p><a id="newLink" href="/charts/spx-trade/?date=2026-05-08&interval=1m&v=20260510-spx-dynamic4">Open chart</a></p>
</div>
<script>
(function(){
  const src = new URLSearchParams(location.search);
  const dst = new URLSearchParams();
  dst.set('date','2026-05-08');
  dst.set('interval', src.get('interval') || src.get('tf') || '1m');
  dst.set('v','20260510-spx-dynamic4');
  ['trade','start','end','tz','pad','show'].forEach(k => { if(src.has(k)) dst.set(k, src.get(k)); });
  const href = '/charts/spx-trade/?' + dst.toString();
  document.getElementById('newLink').href = href;
  location.replace(href);
})();
</script>
</body>
</html>
